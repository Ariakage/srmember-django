{% extends 'base.html' %}

{% block title %}首页 | SR思锐 团队内部成员系统{% endblock %}

{% block content %}
<section class="mx-auto grid max-w-7xl gap-6 px-4 py-8 sm:px-6 lg:grid-cols-[1fr_360px] lg:px-8">
    <div class="rounded-lg border border-slate-200 bg-white p-6 shadow-sm dark:border-white/10 dark:bg-white/5">
        <div class="mb-6 inline-flex rounded-md bg-primary/10 px-3 py-1 text-sm font-medium text-primary dark:bg-primary-2/15 dark:text-primary-2">
            首页
        </div>
        <h1 class="max-w-3xl text-3xl font-semibold tracking-normal text-slate-950 sm:text-4xl dark:text-white">
            SR思锐 团队内部成员系统
        </h1>
        <p class="mt-4 max-w-2xl text-base leading-7 text-slate-600 dark:text-slate-300">
            集中管理团队成员、快捷链接与协作资料。
        </p>
        <div class="mt-8 grid gap-4 sm:grid-cols-3">
            <div class="rounded-lg border border-slate-200 p-4 dark:border-white/10">
                <div class="text-sm text-slate-500 dark:text-slate-400">成员管理</div>
                <a href="{% url 'core:members' %}" class="mt-2 inline-flex text-lg font-semibold text-slate-950 transition hover:text-primary dark:text-white dark:hover:text-primary-2">查看成员</a>
            </div>
            <div class="rounded-lg border border-slate-200 p-4 dark:border-white/10">
                <div class="text-sm text-slate-500 dark:text-slate-400">快捷链接</div>
                <div class="mt-2 text-lg font-semibold text-slate-950 dark:text-white">待接入</div>
            </div>
            <div class="rounded-lg border border-slate-200 p-4 dark:border-white/10">
                <div class="text-sm text-slate-500 dark:text-slate-400">资料中心</div>
                <a href="{% url 'core:documents' %}" class="mt-2 inline-flex text-lg font-semibold text-slate-950 transition hover:text-primary dark:text-white dark:hover:text-primary-2">查看文档</a>
            </div>
        </div>
    </div>
    <aside class="rounded-lg border border-slate-200 bg-gradient-to-br from-primary to-primary-2 p-6 text-white shadow-sm">
        <div class="text-sm font-medium text-white/80">当前入口</div>
        <div class="mt-3 text-2xl font-semibold tracking-normal">团队内部成员系统</div>
        <div class="mt-6 rounded-md bg-white/15 p-4 text-sm leading-6 text-white/90">
            通过顶部导航进入成员、文档、Bio 和快捷链接模块。
        </div>
    </aside>
</section>
{% endblock %}
