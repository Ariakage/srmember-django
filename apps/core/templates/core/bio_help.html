{% extends 'base.html' %}
{% load static %}

{% block title %}Bio Markdown 帮助 | SR思锐 团队内部成员系统{% endblock %}

{% block head_extra %}
<link rel="stylesheet" href="{% static 'core/css/markdown.css' %}">
<script>
    window.MathJax = {
        options: {
            skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code']
        },
        tex: {
            displayMath: [['\\[', '\\]'], ['$$', '$$']],
            inlineMath: [['\\(', '\\)'], ['$', '$']],
            processEscapes: true
        }
    }
</script>
<script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
<script defer src="{% static 'core/js/markdown_tools.js' %}"></script>
{% endblock %}

{% block content %}
<section class="mx-auto max-w-6xl px-4 py-8 sm:px-6 lg:px-8">
    <div class="mb-6 flex flex-col gap-4 sm:flex-row sm:items-end sm:justify-between">
        <div>
            <div class="text-sm font-medium text-primary">/bio/help</div>
            <h1 class="mt-1 text-3xl font-semibold tracking-normal text-slate-950 dark:text-white">Bio Markdown 用法</h1>
        </div>
        <a href="{% url 'core:bio' %}" class="w-fit rounded-md bg-primary px-4 py-2 text-sm font-semibold text-white shadow-sm shadow-primary/30 transition hover:bg-primary-2">
            返回 Bio
        </a>
    </div>

    <div class="grid gap-6 lg:grid-cols-[1.1fr_0.9fr]">
        <article class="rounded-lg border border-slate-200 bg-white p-6 shadow-sm dark:border-white/10 dark:bg-white/5">
            <div class="sr-markdown-shell sr-markdown-body">
                {{ help_html }}
            </div>
        </article>
        <aside class="rounded-lg border border-slate-200 bg-white p-4 shadow-sm dark:border-white/10 dark:bg-white/5">
            <div class="mb-3 text-sm font-semibold text-slate-700 dark:text-slate-200">Markdown 源码</div>
            <textarea readonly class="min-h-[42rem] w-full resize-y rounded-md border border-slate-200 bg-slate-50 px-4 py-3 font-mono text-sm leading-7 text-slate-800 outline-none dark:border-white/10 dark:bg-slate-950 dark:text-slate-200">{{ help_markdown }}</textarea>
        </aside>
    </div>
</section>
{% endblock %}
