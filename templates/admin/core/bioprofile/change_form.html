{% extends "admin/change_form.html" %}
{% load static %}

{% block extrastyle %}
{{ block.super }}
<link rel="stylesheet" href="{% static 'core/css/markdown.css' %}">
<link rel="stylesheet" href="{% static 'admin/css/bio_admin.css' %}">
{% endblock %}

{% block extrahead %}
{{ block.super }}
<script>
    window.MathJax = {
        options: {
            skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre', 'code']
        },
        tex: {
            displayMath: [['\\[', '\\]'], ['$$', '$$']],
            inlineMath: [['\\(', '\\)'], ['$', '$']],
            processEscapes: true
        }
    }
</script>
<script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
<script defer src="{% static 'core/js/markdown_tools.js' %}"></script>
<script>
    document.addEventListener('DOMContentLoaded', () => {
        const bindAdminEditor = () => {
            if (window.SRMarkdown) {
                window.SRMarkdown.bindAdminEditor({
                    endpoint: "{% url 'core:bio_preview' %}",
                    textarea: '#id_markdown'
                })
            }
        }
        bindAdminEditor()
        window.setTimeout(bindAdminEditor, 160)
    })
</script>
{% endblock %}
