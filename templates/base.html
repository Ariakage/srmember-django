{% load static %}
<!doctype html>
<html lang="zh-CN" class="h-full">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}SR思锐 团队内部成员系统{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#7c6cff',
                        'primary-2': '#a78bfa'
                    }
                }
            }
        }
    </script>
    <script>
        const savedTheme = localStorage.getItem('theme')
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches
        if (savedTheme === 'dark' || (!savedTheme && prefersDark)) {
            document.documentElement.classList.add('dark')
        }
    </script>
</head>
<body class="flex min-h-full flex-col bg-slate-50 text-slate-950 antialiased transition-colors dark:bg-slate-950 dark:text-white">
    <header class="sticky top-0 z-40 border-b border-slate-200/80 bg-white/90 backdrop-blur dark:border-white/10 dark:bg-slate-950/85">
        <nav class="flex h-16 w-full items-center px-4 sm:px-6 lg:px-8" aria-label="主导航">
            <div class="flex shrink-0 items-center gap-3">
                <img src="{% static 'images/logo.png' %}" alt="SR思锐" class="h-9 w-9 rounded-md object-contain">
                <div class="hidden leading-tight sm:block">
                    <div class="text-sm font-semibold tracking-normal text-slate-950 dark:text-white">SR思锐</div>
                    <div class="text-xs text-slate-500 dark:text-slate-400">团队内部成员系统</div>
                </div>
            </div>
            <div class="mx-8 h-8 w-px shrink-0 bg-slate-200 dark:bg-white/10"></div>
            <div class="flex min-w-0 items-center gap-1 overflow-x-auto">
                {% for item in nav_items %}
                    <a href="{{ item.url }}" class="whitespace-nowrap rounded-md px-3 py-2 text-sm font-medium transition {% if item.active %}bg-primary text-white shadow-sm shadow-primary/30{% else %}text-slate-600 hover:bg-slate-100 hover:text-slate-950 dark:text-slate-300 dark:hover:bg-white/10 dark:hover:text-white{% endif %}">
                        {{ item.label }}
                    </a>
                {% endfor %}
            </div>
            <div class="ml-auto flex shrink-0 items-center">
                <button id="theme-toggle" type="button" class="inline-flex h-10 w-10 items-center justify-center rounded-md border border-slate-200 bg-white text-slate-700 transition hover:border-primary hover:text-primary dark:border-white/10 dark:bg-white/5 dark:text-slate-200 dark:hover:border-primary-2 dark:hover:text-primary-2" aria-label="切换深色和浅色模式" aria-pressed="false">
                    <svg id="theme-icon-moon" class="h-5 w-5" viewBox="0 0 24 24" aria-hidden="true">
                        <path fill="currentColor" d="M21 14.6A8.5 8.5 0 0 1 9.4 3a7.7 7.7 0 1 0 11.6 11.6Z" />
                    </svg>
                    <svg id="theme-icon-sun" class="hidden h-5 w-5" viewBox="0 0 24 24" aria-hidden="true">
                        <path fill="currentColor" d="M12 17.2a5.2 5.2 0 1 0 0-10.4 5.2 5.2 0 0 0 0 10.4Zm0-13.7a1.2 1.2 0 0 0 1.2-1.2V1.2a1.2 1.2 0 0 0-2.4 0v1.1A1.2 1.2 0 0 0 12 3.5Zm0 17a1.2 1.2 0 0 0-1.2 1.2v1.1a1.2 1.2 0 0 0 2.4 0v-1.1A1.2 1.2 0 0 0 12 20.5ZM22.8 10.8h-1.1a1.2 1.2 0 0 0 0 2.4h1.1a1.2 1.2 0 0 0 0-2.4Zm-20.5 0H1.2a1.2 1.2 0 0 0 0 2.4h1.1a1.2 1.2 0 0 0 0-2.4Zm16.9-6a1.2 1.2 0 0 0-1.7 0l-.8.8a1.2 1.2 0 1 0 1.7 1.7l.8-.8a1.2 1.2 0 0 0 0-1.7ZM6.5 16.7a1.2 1.2 0 0 0-1.7 0l-.8.8a1.2 1.2 0 0 0 1.7 1.7l.8-.8a1.2 1.2 0 0 0 0-1.7Zm11.9 0a1.2 1.2 0 0 0-1.7 1.7l.8.8a1.2 1.2 0 0 0 1.7-1.7l-.8-.8ZM5.6 4.8a1.2 1.2 0 0 0-1.7 1.7l.8.8a1.2 1.2 0 0 0 1.7-1.7l-.8-.8Z" />
                    </svg>
                </button>
            </div>
        </nav>
    </header>
    <main class="flex-1">
        {% block content %}{% endblock %}
    </main>
    <footer class="border-t border-slate-200 bg-white dark:border-white/10 dark:bg-slate-950">
        <div class="mx-auto flex max-w-7xl flex-col gap-3 px-4 py-5 text-sm text-slate-500 sm:flex-row sm:items-center sm:justify-between sm:px-6 lg:px-8 dark:text-slate-400">
            <div>{{ site_setting.footer_copyright }}</div>
            <a href="{{ site_setting.footer_record_url }}" target="_blank" rel="noopener noreferrer" class="transition hover:text-primary dark:hover:text-primary-2">
                {{ site_setting.footer_record_text }}
            </a>
        </div>
    </footer>
    <script>
        const toggleButton = document.getElementById('theme-toggle')
        const themeIconMoon = document.getElementById('theme-icon-moon')
        const themeIconSun = document.getElementById('theme-icon-sun')

        function syncThemeButton() {
            const isDark = document.documentElement.classList.contains('dark')
            toggleButton.setAttribute('aria-pressed', String(isDark))
            themeIconMoon.classList.toggle('hidden', isDark)
            themeIconSun.classList.toggle('hidden', !isDark)
        }

        toggleButton.addEventListener('click', () => {
            const isDark = document.documentElement.classList.toggle('dark')
            localStorage.setItem('theme', isDark ? 'dark' : 'light')
            syncThemeButton()
        })

        syncThemeButton()
    </script>
</body>
</html>
